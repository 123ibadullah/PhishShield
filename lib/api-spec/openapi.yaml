openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PhishShield AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: phishing
    description: Phishing detection operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeEmail
      tags: [phishing]
      summary: Analyze email for phishing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /history:
    get:
      operationId: getScanHistory
      tags: [phishing]
      summary: Get recent scan history
      responses:
        "200":
          description: Recent scan history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanHistoryItem"
    delete:
      operationId: clearScanHistory
      tags: [phishing]
      summary: Clear scan history
      responses:
        "200":
          description: History cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /metrics:
    get:
      operationId: getModelMetrics
      tags: [phishing]
      summary: Get model performance metrics
      responses:
        "200":
          description: Model metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelMetrics"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeRequest:
      type: object
      properties:
        emailText:
          type: string
      required:
        - emailText
    UrlAnalysis:
      type: object
      properties:
        url:
          type: string
        domain:
          type: string
        riskScore:
          type: number
        flags:
          type: array
          items:
            type: string
        isSuspicious:
          type: boolean
      required:
        - url
        - domain
        - riskScore
        - flags
        - isSuspicious
    DetectionReason:
      type: object
      properties:
        category:
          type: string
          enum: [urgency, financial, social_engineering, url, domain, india_specific, ml_score, language]
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
        matchedTerms:
          type: array
          items:
            type: string
      required:
        - category
        - description
        - severity
        - matchedTerms
    SuspiciousSpan:
      type: object
      properties:
        start:
          type: integer
        end:
          type: integer
        text:
          type: string
        reason:
          type: string
      required:
        - start
        - end
        - text
        - reason
    AnalyzeResult:
      type: object
      properties:
        riskScore:
          type: number
        classification:
          type: string
          enum: [safe, suspicious, phishing]
        confidence:
          type: number
        detectedLanguage:
          type: string
          description: "Detected language code: en, hi, te, mixed"
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/DetectionReason"
        suspiciousSpans:
          type: array
          items:
            $ref: "#/components/schemas/SuspiciousSpan"
        urlAnalyses:
          type: array
          items:
            $ref: "#/components/schemas/UrlAnalysis"
        safetyTips:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        mlScore:
          type: number
        ruleScore:
          type: number
        urlScore:
          type: number
      required:
        - riskScore
        - classification
        - confidence
        - detectedLanguage
        - reasons
        - suspiciousSpans
        - urlAnalyses
        - safetyTips
        - warnings
        - mlScore
        - ruleScore
        - urlScore
    ScanHistoryItem:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          description: ISO 8601 timestamp
        emailPreview:
          type: string
          description: First 80 characters of the email text
        riskScore:
          type: number
        classification:
          type: string
          enum: [safe, suspicious, phishing]
        detectedLanguage:
          type: string
        urlCount:
          type: integer
        reasonCount:
          type: integer
      required:
        - id
        - timestamp
        - emailPreview
        - riskScore
        - classification
        - detectedLanguage
        - urlCount
        - reasonCount
    ModelMetrics:
      type: object
      properties:
        accuracy:
          type: number
          description: Model accuracy 0-1
        precision:
          type: number
          description: Precision 0-1
        recall:
          type: number
          description: Recall 0-1
        f1Score:
          type: number
          description: F1 score 0-1
        falsePositiveRate:
          type: number
          description: False positive rate 0-1
        totalScans:
          type: integer
          description: Total scans in current session
        phishingDetected:
          type: integer
        suspiciousDetected:
          type: integer
        safeDetected:
          type: integer
      required:
        - accuracy
        - precision
        - recall
        - f1Score
        - falsePositiveRate
        - totalScans
        - phishingDetected
        - suspiciousDetected
        - safeDetected
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
